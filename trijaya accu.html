<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR AKI PRO</title>
    <style id="customStyle">
        :root { --font-family: sans-serif; --font-size: 16px; }
        body { font-family: var(--font-family); background: #f0f2f5; padding: 10px; margin: 0; font-size: var(--font-size); }
        .card, .settings-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; margin-bottom: 20px; }
        h2 { text-align: center; color: #1a73e8; margin: 0 0 15px 0; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.9em; color: #333; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .total-area { background: #fff3f3; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; border: 2px dashed #ff4d4d; }
        .total-val { font-size: 1.5em; font-weight: bold; color: #d93025; }
        button { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .btn-print { background: #1a73e8; color: white; }
        .btn-settings { background: #607d8b; color: white; margin-top: 10px; font-size: 0.9em; }
        .hidden { display: none; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div id="mainPage" class="card">
    <h2 id="viewNamaToko">TOKO AKI AYAH</h2>

    <label>Merk Aki:</label>
    <select id="merk">
        <option value="">-- PILIH MERK --</option>
        <option value="AMARON">AMARON</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="FASTER">FASTER</option>
        <option value="SOLITE">SOLITE</option>
        <option value="MSB">MSB</option>
        <option value="FB">FB</option>
        <option value="QS">QS</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="JAP">JAP</option>
        <option value="KRP">KRP</option>
        <option value="SOLANA">SOLANA</option>
        <option value="JB">JB</option>
        <option value="KAYABA">KAYABA</option>
        <option value="ITOBATT">ITOBATT</option>
        <option value="MPOWER">MPOWER</option>
    </select>

    <label>Tipe/Kode Aki:</label>
    <input list="tipe-list" id="tipe" placeholder="Ketik/Pilih Kode...">
    <datalist id="tipe-list">
        <option value="GTZ5L / YTZ5S (5S)"> <option value="GTZ6V (6V)"> <option value="GTZ7S (7S)"> <option value="GM5Z (5Z)">
        <option value="NS40 / Z / ZL"> <option value="NS60 / L / LS"> <option value="N50 / Z"> <option value="NS70">
        <option value="N70 / Z"> <option value="N100"> <option value="N120"> <option value="DIN LN2"> <option value="DIN LN3">
    </datalist>

    <label>Garansi:</label>
    <select id="garansi">
        <option value="1 Bulan">1 Bulan</option>
        <option value="3 Bulan">3 Bulan</option>
        <option value="6 Bulan" selected>6 Bulan</option>
        <option value="12 Bulan">12 Bulan</option>
    </select>

    <label>Harga (Rp):</label>
    <input type="number" id="harga" placeholder="0">

    <label>Potongan TT (Rp):</label>
    <input type="number" id="pot" value="0">

    <div class="total-area">
        <span id="totalDisplay" class="total-val">Rp 0</span>
    </div>

    <button class="btn-print" onclick="cetak()">CETAK STRUK</button>
    <button class="btn-settings" onclick="toggleSettings()">⚙️ SETELAN STRUK</button>
</div>

<div id="settingsPage" class="settings-card hidden">
    <h3>⚙️ PENGATURAN CUSTOM</h3>
    
    <label>Nama Toko:</label>
    <input type="text" id="cfgNama" value="TOKO AKI AYAH">

    <label>Jenis Font (Mirip Thermer):</label>
    <select id="cfgFont" onchange="applyStyle()">
        <option value="sans-serif">Modern (Sans-Serif)</option>
        <option value="serif">Klasik (Serif)</option>
        <option value="monospace">Mesin Tik (Monospace)</option>
        <option value="cursive">Tulis Tangan (Cursive)</option>
    </select>

    <label>Ukuran Font Aplikasi:</label>
    <select id="cfgSize" onchange="applyStyle()">
        <option value="14px">Kecil</option>
        <option value="16px" selected>Sedang</option>
        <option value="20px">Besar</option>
    </select>

    <label>Pesan Penutup Struk:</label>
    <input type="text" id="cfgNote" value="Aki Bekas Kami Beli Tinggi">

    <button class="btn-print" style="background:#2ecc71" onclick="saveSettings()">SIMPAN PERUBAHAN</button>
    <button class="btn-settings" style="background:#e74c3c" onclick="toggleSettings()">KEMBALI</button>
</div>

<script>
    // Update Total Otomatis
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let t = parseInt(h) - parseInt(p);
        document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
    }
    document.getElementById('harga').addEventListener('input', update);
    document.getElementById('pot').addEventListener('input', update);

    function toggleSettings() {
        document.getElementById('mainPage').classList.toggle('hidden');
        document.getElementById('settingsPage').classList.toggle('hidden');
    }

    function applyStyle() {
        let f = document.getElementById('cfgFont').value;
        let s = document.getElementById('cfgSize').value;
        document.documentElement.style.setProperty('--font-family', f);
        document.documentElement.style.setProperty('--font-size', s);
    }

    function saveSettings() {
        let nama = document.getElementById('cfgNama').value;
        document.getElementById('viewNamaToko').innerText = nama;
        alert("Setelan Disimpan!");
        toggleSettings();
    }

    function cetak() {
        let tgl = new Date().toLocaleString('id-ID');
        let m = document.getElementById('merk').value;
        let tp = document.getElementById('tipe').value;
        let g = document.getElementById('garansi').value;
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let n = document.getElementById('cfgNama').value;
        let note = document.getElementById('cfgNote').value;
        let total = parseInt(h) - parseInt(p);

        let struk = `${n}\n` +
                    `--------------------------\n` +
                    `${tgl}\n` +
                    `--------------------------\n` +
                    `Barang : ${m} ${tp}\n` +
                    `Harga  : Rp ${parseInt(h).toLocaleString('id-ID')}\n` +
                    `Pot.TT : -Rp ${parseInt(p).toLocaleString('id-ID')}\n` +
                    `--------------------------\n` +
                    `TOTAL  : Rp ${total.toLocaleString('id-ID')}\n\n` +
                    `GARANSI: ${g}\n` +
                    `${note}\n` +
                    `--------------------------\n` +
                    `Terima Kasih!`;

        if(navigator.share) {
            navigator.share({ text: struk });
        } else {
            alert("Gunakan Chrome ya!");
        }
    }
</script>
</body>
</html>
