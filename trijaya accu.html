<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR TRIJAYA ACCU</title>
    <style>
        :root { --bg: #f4f7f6; --text: #333; --accent: #cf1322; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--text); padding-bottom: 10px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .total-box { background: #fff1f0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; border: 1px solid #ffccc7; }
        .total-val { font-size: 26px; font-weight: bold; color: var(--accent); }
        button { width: 100%; padding: 16px; background: #333; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        /* CSS UNTUK TAMPILAN PRINT (RAHASIA BIAR RAPI) */
        #print-area { display: none; font-family: 'Courier New', Courier, monospace; width: 58mm; font-size: 12px; line-height: 1.2; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>TRIJAYA ACCU</h2>
        <div class="sub">TUKAR TAMBAH ACCU</div>
    </div>

    <label>1. Merk:</label>
    <select id="merk">
        <option value="">-- PILIH --</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB</option>
        <option value="JAP">JAP</option>
    </select>

    <label>2. Tipe Aki:</label>
    <input list="tipe-list" id="tipe" placeholder="NS40, GTZ5S...">
    <datalist id="tipe-list">
        <option value="GTZ5S"> <option value="YTZ5S"> <option value="NS40"> <option value="NS60"> <option value="NS70">
    </datalist>

    <label>3. Harga Jual:</label>
    <input type="number" id="harga" placeholder="0" oninput="update()">

    <label>4. Potongan TT:</label>
    <input type="number" id="pot" value="0" oninput="update()">

    <div class="total-box">
        <span class="total-val" id="totalDisplay">Rp 0</span>
    </div>

    <button onclick="prosesCetak()">PRINT STRUK</button>
</div>

<div id="print-area"></div>

<script>
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let t = parseInt(h) - parseInt(p);
        document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
    }

    function formatLine(left, right) {
        let totalWidth = 30; // Lebar kertas thermal standar
        let space = totalWidth - left.length - right.length;
        return left + " ".repeat(Math.max(1, space)) + right;
    }

    function prosesCetak() {
        let m = document.getElementById('merk').value;
        let tp = document.getElementById('tipe').value;
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let total = parseInt(h) - parseInt(p);
        let tgl = new Date().toLocaleDateString('id-ID');

        if (!m || !tp || h == 0) { alert("Data kurang, Bos!"); return; }

        let garansi = (m === "GS ASTRA") ? "1 BULAN" : 
                      (m === "FB" || m === "SOLITE" || m === "JAP") ? "12 BULAN" : "3 BULAN";

        // BIKIN TAMPILAN NOTA (PAKE HURUF STANDAR BIAR PASTI KELUAR)
        let htmlNota = `
            <div style="text-align:center; font-weight:bold; font-size:16px;">TRIJAYA ACCU</div>
            <div style="text-align:center; font-weight:bold; font-size:16px; margin-bottom:5px;">A K K U</div>
            <div style="text-align:center; font-size:10px;">TUKAR TAMBAH ACCU</div>
            <div style="text-align:center; font-size:10px; margin-bottom:5px;">WA: 0821-4320-2129</div>
            <pre>------------------------------</pre>
            <pre>${formatLine("Tanggal", tgl)}</pre>
            <pre>------------------------------</pre>
            <pre>${formatLine("Merk", m)}</pre>
            <pre>${formatLine("Tipe", tp)}</pre>
            <pre>${formatLine("Harga", "Rp " + parseInt(h).toLocaleString('id-ID'))}</pre>
            <pre>${formatLine("Pot.TT", "-Rp " + parseInt(p).toLocaleString('id-ID'))}</pre>
            <pre>------------------------------</pre>
            <pre>${formatLine("TOTAL", "Rp " + total.toLocaleString('id-ID'))}</pre>
            <pre>------------------------------</pre>
            <pre>${formatLine("Garansi", garansi)}</pre>
            <pre>------------------------------</pre>
            <div style="text-align:center; margin-top:10px;">*** TERIMA KASIH ***</div>
        `;

        document.getElementById('print-area').innerHTML = htmlNota;
        window.print(); // LANGSUNG BUKA MENU CETAK HP
    }
</script>
</body>
</html>
