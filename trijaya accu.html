<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASIR TRIJAYA ACCU</title>

<style>
:root { --bg: #f4f7f6; --text: #333; --accent: #cf1322; }

body {
    font-family: sans-serif;
    background: var(--bg);
    padding: 15px;
    margin: 0;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.header {
    text-align: center;
    border-bottom: 2px solid var(--text);
    padding-bottom: 10px;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    font-size: 14px;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}

.total-box {
    background: #fff1f0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
    border: 1px solid #ffccc7;
}

.total-val {
    font-size: 26px;
    font-weight: bold;
    color: var(--accent);
}

button {
    width: 100%;
    padding: 16px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    margin-top: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h2>TRIJAYA ACCU</h2>
        <div>TUKAR TAMBAH ACCU</div>
    </div>

    <label>1. Pilih Merk:</label>
    <select id="merk">
        <option value="">-- PILIH MERK --</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="FASTER">FASTER</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB (FURUKAWA)</option>
        <option value="JAP">JAP</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="QS">QS</option>
        <option value="MPOWER">MPOWER</option>
    </select>

    <label>2. Tipe Aki:</label>
    <input list="tipe-list" id="tipe" placeholder="Contoh: NS40, GTZ5S">
    <datalist id="tipe-list">
        <option value="GTZ5S"><option value="YTZ5S"><option value="GTZ6V"><option value="YTZ6V">
        <option value="GTZ7S"><option value="YTZ7S"><option value="GM5Z"><option value="YB5L-B">
        <option value="MTX5"><option value="MTX7A"><option value="MTX9"><option value="12N10-3B">
        <option value="NS40"><option value="NS40Z"><option value="NS60"><option value="N50">
        <option value="NS70"><option value="N70"><option value="N100"><option value="N120">
    </datalist>

    <label>3. Harga Jual (Rp):</label>
    <input type="number" id="harga" placeholder="0">

    <label>4. Potongan TT (Rp):</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="totalDisplay">Rp 0</span>
    </div>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<script>

// UPDATE TOTAL
function update() {
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let t = parseInt(h) - parseInt(p);
    document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
}
document.getElementById('harga').addEventListener('input', update);
document.getElementById('pot').addEventListener('input', update);

// FORMAT TENGAH
function format(text, width = 32) {
    let isCenter = text.includes("<c>");
    let cleanText = text.replace("<c>", "");
    if (isCenter) {
        let space = Math.floor((width - cleanText.length) / 2);
        return " ".repeat(Math.max(0, space)) + cleanText;
    }
    return cleanText;
}

// RATA KANAN (KAYAK KASIR)
function padRight(label, value, width = 32) {
    let space = width - (label.length + value.length);
    return label + " ".repeat(Math.max(1, space)) + value;
}

// CETAK STRUK PRO
function cetak() {
    let tgl = new Date().toLocaleString('id-ID');
    let m = document.getElementById('merk').value;
    let tp = document.getElementById('tipe').value;
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let total = parseInt(h) - parseInt(p);

    if (!m || !tp || h == 0) {
        alert("Data Belum Lengkap!");
        return;
    }

    let garansi = (m === "GS ASTRA") ? "1 BULAN" : 
                  (m.includes("FB") || m.includes("SOLITE") || m.includes("JAP")) ? "12 BULAN" : "3 BULAN";

    let garis = "================================";

    let struk = [
        format("<c>T R I J A Y A"),
        format("<c>A C C U"),
        format("<c>TUKAR TAMBAH ACCU"),
        format("<c>WA: 0821-4320-2129"),
        "",
        garis,
        padRight("Tanggal", tgl),
        garis,
        padRight("Merk", m),
        padRight("Tipe", tp),
        padRight("Harga", "Rp " + parseInt(h).toLocaleString('id-ID')),
        padRight("Pot.TT", "-Rp " + parseInt(p).toLocaleString('id-ID')),
        "--------------------------------",
        padRight("TOTAL", "Rp " + total.toLocaleString('id-ID')),
        garis,
        padRight("Garansi", garansi),
        garis,
        "",
        format("<c>*** TERIMA KASIH ***"),
        format("<c>SILAHKAN DATANG KEMBALI"),
        garis
    ].join("\n");

    if (navigator.share) {
        navigator.share({ text: struk });
    } else {
        alert("Buka lewat Chrome ya!");
    }
}

</script>

</body>
</html>
