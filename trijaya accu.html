<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASIR TRIJAYA ACCU</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

:root { --bg: #f4f7f6; --text: #333; --accent: #cf1322; }

body {
    font-family: sans-serif;
    background: var(--bg);
    padding: 15px;
    margin: 0;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* LOGO OUTLINE (WEB DOANG 🔥) */
.logo {
    font-family: 'Anton', sans-serif;
    font-size: 30px;
    text-align: center;
    color: white;

    -webkit-text-stroke: 2px black;
    letter-spacing: 3px;

    background: white;
    padding: 12px;
    border-radius: 16px; /* SUDUT TUMPUL */
    margin-bottom: 5px;
}

.sub {
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
}

/* FORM */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* TOTAL */
.total-box {
    background: #fff1f0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
}

.total-val {
    font-size: 26px;
    font-weight: bold;
    color: var(--accent);
}

/* BUTTON */
button {
    width: 100%;
    padding: 16px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <!-- HEADER WEB KEREN -->
    <div class="logo">TRIJAYA ACCU</div>
    <div class="sub">TUKAR TAMBAH ACCU<br>WA: 0821-4320-2129</div>

    <label>Merk:</label>
    <select id="merk">
        <option value="">-- PILIH --</option>
        <option>GS ASTRA</option>
        <option>AMARON</option>
        <option>YUASA</option>
    </select>

    <label>Tipe:</label>
    <input id="tipe" placeholder="NS40">

    <label>Harga:</label>
    <input type="number" id="harga">

    <label>Potongan:</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="total">Rp 0</span>
    </div>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<script>
// UPDATE TOTAL
function update() {
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let t = h - p;
    document.getElementById('total').innerText =
        "Rp " + t.toLocaleString('id-ID');
}
document.getElementById('harga').oninput = update;
document.getElementById('pot').oninput = update;

// FORMAT TENGAH
function format(text, width = 32) {
    let isCenter = text.includes("<c>");
    let cleanText = text.replace("<c>", "");
    if (isCenter) {
        let space = Math.floor((width - cleanText.length) / 2);
        return " ".repeat(Math.max(0, space)) + cleanText;
    }
    return cleanText;
}

// CETAK STRUK (BALIK KE TEXT)
function cetak() {
    let tgl = new Date().toLocaleString('id-ID');
    let m = document.getElementById('merk').value;
    let tp = document.getElementById('tipe').value;
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let total = h - p;

    if (!m || !tp || h == 0) {
        alert("Data belum lengkap!");
        return;
    }

    let garis = "================================";

    let struk = [
        format("<c>T R I J A Y A"),
        format("<c>A C C U"),
        format("<c>TUKAR TAMBAH ACCU"),
        format("<c>WA: 0821-4320-2129"),
        "",
        garis,
        "Tanggal : " + tgl,
        garis,
        "Merk    : " + m,
        "Tipe    : " + tp,
        "Harga   : Rp " + Number(h).toLocaleString('id-ID'),
        "Pot.TT  : -Rp " + Number(p).toLocaleString('id-ID'),
        garis,
        "TOTAL   : Rp " + total.toLocaleString('id-ID'),
        garis,
        format("<c>*** TERIMA KASIH ***"),
        garis
    ].join("\n");

    if (navigator.share) {
        navigator.share({ text: struk });
    } else {
        alert(struk);
    }
}
</script>

</body>
</html>
