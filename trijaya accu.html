<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR TRIJAYA ACCU</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { margin: 0; color: #333; font-size: 22px; letter-spacing: 1px; }
        .sub { font-size: 12px; font-weight: bold; color: #666; margin-top: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .total-box { background: #fff1f0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; border: 1px solid #ffccc7; }
        .total-val { font-size: 26px; font-weight: bold; color: #cf1322; }
        button { width: 100%; padding: 16px; background: #333; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        button:active { background: #000; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>TRIJAYA ACCU</h2>
        <div class="sub">TUKAR TAMBAH ACCU</div>
    </div>

    <label>1. Pilih Merk:</label>
    <select id="merk">
        <option value="">-- PILIH MERK --</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="FASTER">FASTER</option>
        <option value="SOLITE">SOLITE</option>
        <option value="MSB">MSB</option>
        <option value="FB">FB (FURUKAWA)</option>
        <option value="QS">QS</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="JAP">JAP</option>
        <option value="KRP">KRP</option>
        <option value="SOLANA">SOLANA</option>
        <option value="JB">JB</option>
        <option value="KAYABA">KAYABA</option>
        <option value="ITOBATT">ITOBATT</option>
        <option value="MPOWER">MPOWER</option>
    </select>

    <label>2. Kode Aki (Tanpa LN/DIN):</label>
    <input list="tipe-list" id="tipe" placeholder="Contoh: NS40, 5S, N70...">
    <datalist id="tipe-list">
        <option value="GTZ5S (5S)"> <option value="GTZ6V (6V)"> <option value="GTZ7S (7S)"> <option value="GM5Z (5Z)">
        <option value="NS40 / Z / ZL"> <option value="NS60 / L / LS"> <option value="N50 / Z"> <option value="NS70 / L">
        <option value="N70 / Z / ZL"> <option value="N100"> <option value="N120"> <option value="MTX7A"> <option value="MTX9">
    </datalist>

    <label>3. Harga Aki (Rp):</label>
    <input type="number" id="harga" placeholder="0">

    <label>4. Potongan TT (Rp):</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="totalDisplay">Rp 0</span>
    </div>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<script>
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let t = parseInt(h) - parseInt(p);
        document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
    }
    document.getElementById('harga').addEventListener('input', update);
    document.getElementById('pot').addEventListener('input', update);

    function cetak() {
        let tgl = new Date().toLocaleString('id-ID');
        let m = document.getElementById('merk').value;
        let tp = document.getElementById('tipe').value;
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let total = parseInt(h) - parseInt(p);

        if (!m || !tp || h == 0) {
            alert("Lengkapi data dulu ya!");
            return;
        }

        // LOGIKA GARANSI OTOMATIS
        let garansi = "3 BULAN"; // Default
        if (m === "GS ASTRA") {
            garansi = "1 BULAN";
        } else if (m === "FB" || m === "SOLITE" || m === "JAP") {
            garansi = "TERTULIS"; 
        }

        // Judul Outline untuk Nota: 𝕋ℝ𝕀𝕁𝔸𝕐𝔸 𝔸ℂℂ𝕌
        let titleOutline = `𝕋ℝ𝕀𝕁𝔸𝕐𝔸 𝔸ℂℂ𝕌`;
        
        let struk = `      ${titleOutline}      \n` +
                    `  TUKAR TAMBAH ACCU  \n` +
                    `--------------------------\n` +
                    `${tgl}\n` +
                    `--------------------------\n` +
                    `Merk   : ${m}\n` +
                    `Tipe   : ${tp}\n` +
                    `Harga  : Rp ${parseInt(h).toLocaleString('id-ID')}\n` +
                    `Pot.TT : -Rp ${parseInt(p).toLocaleString('id-ID')}\n` +
                    `--------------------------\n` +
                    `TOTAL  : Rp ${total.toLocaleString('id-ID')}\n\n` +
                    `GARANSI: ${garansi}\n` +
                    `Aki Bekas Kami Beli Tinggi\n` +
                    `--------------------------\n` +
                    `      Terima Kasih!       \n` +
                    `--------------------------`;

        if(navigator.share) {
            navigator.share({ text: struk });
        } else {
            alert("Gunakan Chrome di HP Ayah!");
        }
    }
</script>
</body>
</html>
