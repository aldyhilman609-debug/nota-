<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASIR TRIJAYA ACCU</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

:root {
    --bg: #f4f7f6;
    --text: #333;
    --accent: #cf1322;
}

body {
    font-family: sans-serif;
    background: var(--bg);
    padding: 15px;
    margin: 0;
}

/* CARD INPUT */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* LOGO ATAS */
.logo {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    text-align: center;
    color: white;
    -webkit-text-stroke: 2px black;
    letter-spacing: 3px;
    background: white;
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 5px;
}

/* LOGO STRUK (ELEPHANT) */
.struk-logo {
    font-family: 'Elephant', serif;
    font-size: 28px;
    text-align: center;
    line-height: 1.1;
    letter-spacing: 2px;
    color: black;
}

/* SUB HEADER */
.sub {
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}

/* FORM */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* TOTAL */
.total-box {
    background: #fff1f0;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: center;
}

.total-val {
    font-size: 26px;
    font-weight: bold;
    color: var(--accent);
}

/* BUTTON */
button {
    width: 100%;
    padding: 16px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    font-size: 18px;
    cursor: pointer;
}

/* STRUK VISUAL */
.struk {
    display: none;
    max-width: 320px;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    font-family: monospace;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.center { text-align: center; }

.row {
    display: flex;
    justify-content: space-between;
}

.line {
    border-top: 1px dashed #000;
    margin: 8px 0;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">TRIJAYA ACCU</div>
    <div class="sub">TUKAR TAMBAH ACCU<br>WA: 0821-4320-2129</div>

    <label>Merk:</label>
    <select id="merk">
        <option value="">-- PILIH --</option>
        <option>GS ASTRA</option>
        <option>AMARON</option>
        <option>YUASA</option>
    </select>

    <label>Tipe:</label>
    <input id="tipe" placeholder="NS40">

    <label>Harga:</label>
    <input type="number" id="harga">

    <label>Potongan:</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="total">Rp 0</span>
    </div>

    <button onclick="buatStruk()">LIHAT STRUK</button>
</div>


<!-- STRUK -->
<div class="struk" id="struk">

    <!-- LOGO STRUK FIX -->
    <div class="struk-logo">
        TRIJAYA<br>ACCU
    </div>

    <div class="center">TUKAR TAMBAH ACCU<br>WA: 0821-4320-2129</div>

    <div class="line"></div>

    <div class="row"><span>Tanggal</span><span id="s_tgl"></span></div>

    <div class="line"></div>

    <div class="row"><span>Merk</span><span id="s_merk"></span></div>
    <div class="row"><span>Tipe</span><span id="s_tipe"></span></div>
    <div class="row"><span>Harga</span><span id="s_harga"></span></div>
    <div class="row"><span>Pot.TT</span><span id="s_pot"></span></div>

    <div class="line"></div>

    <div class="row" style="font-weight:bold;">
        <span>TOTAL</span><span id="s_total"></span>
    </div>

    <div class="line"></div>

    <div class="row"><span>Garansi</span><span id="s_garansi"></span></div>

    <div class="line"></div>

    <div class="center">*** TERIMA KASIH ***</div>

</div>

<script>
function update() {
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let t = h - p;
    document.getElementById('total').innerText = "Rp " + t.toLocaleString('id-ID');
}

document.getElementById('harga').addEventListener('input', update);
document.getElementById('pot').addEventListener('input', update);

function buatStruk() {
    let m = document.getElementById('merk').value;
    let tp = document.getElementById('tipe').value;
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    let total = h - p;

    if (!m || !tp || h == 0) {
        alert("Isi dulu datanya!");
        return;
    }

    let garansi = (m === "GS ASTRA") ? "1 BULAN" : "3 BULAN";

    document.getElementById('s_tgl').innerText = new Date().toLocaleString('id-ID');
    document.getElementById('s_merk').innerText = m;
    document.getElementById('s_tipe').innerText = tp;
    document.getElementById('s_harga').innerText = "Rp " + Number(h).toLocaleString('id-ID');
    document.getElementById('s_pot').innerText = "-Rp " + Number(p).toLocaleString('id-ID');
    document.getElementById('s_total').innerText = "Rp " + total.toLocaleString('id-ID');
    document.getElementById('s_garansi').innerText = garansi;

    document.getElementById('struk').style.display = "block";
}
</script>

</body>
</html>
