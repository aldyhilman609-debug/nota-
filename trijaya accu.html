<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASIR TRIJAYA ACCU</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

:root {
    --bg: #f4f7f6;
}

body {
    font-family: sans-serif;
    background: var(--bg);
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: auto;
}

/* LOGO OUTLINE */
.logo {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    text-align: center;
    color: white;
    -webkit-text-stroke: 2px black;
    letter-spacing: 3px;
    background: white;
    padding: 12px;
    border-radius: 16px;
}

/* TEXT */
.sub {
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}

label {
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    margin-top: 5px;
}

/* TOTAL */
.total {
    text-align: center;
    font-size: 22px;
    margin-top: 15px;
    color: red;
}

/* BUTTON */
button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: black;
    color: white;
    border-radius: 10px;
    border: none;
}

/* STRUK */
.struk {
    display: none;
    max-width: 300px;
    margin: auto;
    background: white;
    padding: 15px;
    font-family: monospace;
}

.row {
    display: flex;
    justify-content: space-between;
}

.line {
    border-top: 1px dashed black;
    margin: 5px 0;
}

.center {
    text-align: center;
}

/* PRINT MODE */
@media print {
    body * {
        visibility: hidden;
    }

    #struk, #struk * {
        visibility: visible;
    }

    #struk {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">TRIJAYA ACCU</div>
    <div class="sub">TUKAR TAMBAH ACCU<br>WA: 0821-4320-2129</div>

    <label>Merk</label>
    <select id="merk">
        <option value="">-- pilih --</option>
        <option>GS ASTRA</option>
        <option>AMARON</option>
        <option>YUASA</option>
    </select>

    <label>Tipe</label>
    <input id="tipe">

    <label>Harga</label>
    <input type="number" id="harga">

    <label>Potongan</label>
    <input type="number" id="pot" value="0">

    <div class="total" id="total">Rp 0</div>

    <button onclick="printStruk()">PRINT STRUK</button>
</div>

<!-- STRUK -->
<div class="struk" id="struk">
    <div class="logo">TRIJAYA ACCU</div>
    <div class="center">TUKAR TAMBAH ACCU<br>WA: 0821-4320-2129</div>

    <div class="line"></div>

    <div class="row"><span>Tanggal</span><span id="tgl"></span></div>

    <div class="line"></div>

    <div class="row"><span>Merk</span><span id="merk_s"></span></div>
    <div class="row"><span>Tipe</span><span id="tipe_s"></span></div>
    <div class="row"><span>Harga</span><span id="harga_s"></span></div>
    <div class="row"><span>Pot.TT</span><span id="pot_s"></span></div>

    <div class="line"></div>

    <div class="row"><b>TOTAL</b><b id="total_s"></b></div>

    <div class="line"></div>

    <div class="row"><span>Garansi</span><span id="garansi"></span></div>

    <div class="line"></div>

    <div class="center">*** TERIMA KASIH ***</div>
</div>

<script>
function update() {
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;
    document.getElementById('total').innerText =
        "Rp " + (h - p).toLocaleString('id-ID');
}

document.getElementById('harga').oninput = update;
document.getElementById('pot').oninput = update;

function printStruk() {
    let m = document.getElementById('merk').value;
    let t = document.getElementById('tipe').value;
    let h = document.getElementById('harga').value || 0;
    let p = document.getElementById('pot').value || 0;

    if (!m || !t || h == 0) {
        alert("Isi data dulu!");
        return;
    }

    let total = h - p;
    let g = (m === "GS ASTRA") ? "1 BULAN" : "3 BULAN";

    document.getElementById('tgl').innerText =
        new Date().toLocaleString('id-ID');
    document.getElementById('merk_s').innerText = m;
    document.getElementById('tipe_s').innerText = t;
    document.getElementById('harga_s').innerText =
        "Rp " + Number(h).toLocaleString('id-ID');
    document.getElementById('pot_s').innerText =
        "-Rp " + Number(p).toLocaleString('id-ID');
    document.getElementById('total_s').innerText =
        "Rp " + total.toLocaleString('id-ID');
    document.getElementById('garansi').innerText = g;

    document.getElementById('struk').style.display = "block";

    setTimeout(() => {
        window.print();
    }, 300);
}
</script>

</body>
</html>
