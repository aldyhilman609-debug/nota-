<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR TRIJAYA ACCU</title>
    
    <style>
        /* === BAGIAN CUSTOM GAMPANG (GANTI DISINI) === */
        :root {
            --warna-utama: #333333;
            --warna-aksen: #cf1322; /* Warna Merah Total */
            --warna-bg: #f4f7f6;
            --font-size-label: 14px;
            --font-size-input: 16px;
            --radius: 10px;
        }

        /* === CSS TATA LETAK === */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--warna-bg); 
            padding: 15px; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: var(--radius); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 400px; 
            margin: auto; 
        }

        .header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 2px solid var(--warna-utama); 
            padding-bottom: 10px; 
        }

        h2 { margin: 0; color: var(--warna-utama); font-size: 22px; }
        .sub { font-size: 12px; font-weight: bold; color: #666; margin-top: 5px; }

        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: var(--font-size-label); 
        }

        select, input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: var(--radius); 
            box-sizing: border-box; 
            font-size: var(--font-size-input); 
        }

        .total-box { 
            background: #fff1f0; 
            padding: 15px; 
            border-radius: var(--radius); 
            margin-top: 20px; 
            text-align: center; 
            border: 1px solid #ffccc7; 
        }

        .total-val { 
            font-size: 26px; 
            font-weight: bold; 
            color: var(--warna-aksen); 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--warna-utama); 
            color: white; 
            border: none; 
            border-radius: var(--radius); 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 20px; 
            cursor: pointer; 
        }

        button:active { background: #000; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>TRIJAYA ACCU</h2>
        <div class="sub">TUKAR TAMBAH ACCU</div>
    </div>

    <label>1. Pilih Merk:</label>
    <select id="merk">
        <option value="">-- PILIH MERK --</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="FASTER">FASTER</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB (FURUKAWA)</option>
        <option value="JAP">JAP</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="QS">QS</option>
        <option value="MSB">MSB</option>
        <option value="KRP">KRP</option>
        <option value="SOLANA">SOLANA</option>
        <option value="JB">JB</option>
        <option value="KAYABA">KAYABA</option>
        <option value="ITOBATT">ITOBATT</option>
        <option value="MPOWER">MPOWER</option>
    </select>

    <label>2. Tipe Aki:</label>
    <input list="tipe-list" id="tipe" placeholder="NS40, GTZ5S, dll">
    <datalist id="tipe-list">
        <option value="GTZ5S"> <option value="YTZ5S"> <option value="GTZ6V"> <option value="YTZ6V"> 
        <option value="GTZ7S"> <option value="YTZ7S"> <option value="GM5Z"> <option value="YB5L-B">
        <option value="MTX5"> <option value="MTX7A"> <option value="MTX9"> <option value="12N10-3B">
        <option value="NS40"> <option value="NS40Z"> <option value="NS60"> <option value="N50"> 
        <option value="NS70"> <option value="N70"> <option value="N100"> <option value="N120">
    </datalist>

    <label>3. Harga Jual (Rp):</label>
    <input type="number" id="harga" placeholder="0">

    <label>4. Potongan TT (Rp):</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="totalDisplay">Rp 0</span>
    </div>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<script>
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let t = parseInt(h) - parseInt(p);
        document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
    }
    document.getElementById('harga').addEventListener('input', update);
    document.getElementById('pot').addEventListener('input', update);

    function cetak() {
        let tgl = new Date().toLocaleString('id-ID');
        let m = document.getElementById('merk').value;
        let tp = document.getElementById('tipe').value;
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let total = parseInt(h) - parseInt(p);

        if (!m || !tp || h == 0) {
            alert("Isi data Merk, Tipe, dan Harga!");
            return;
        }

        // LOGIKA GARANSI FIX (1, 3, 12 BULAN)
        let garansi = "3 BULAN"; // Default merk lain
        if (m === "GS ASTRA") {
            garansi = "1 BULAN";
        } else if (m.includes("FB") || m.includes("SOLITE") || m.includes("JAP")) {
            garansi = "12 BULAN"; 
        }

        // Judul Outline: 𝕋ℝ𝕀𝕁𝔸𝕐𝔸 𝔸ℂℂ𝕌
        let titleOutline = `𝕋ℝ𝕀𝕁𝔸𝕐𝔸 𝔸ℂℂ𝕌`;
        
        let struk = `      ${titleOutline}      \n` +
                    `  TUKAR TAMBAH ACCU  \n` +
                    `--------------------------\n` +
                    `${tgl}\n` +
                    `--------------------------\n` +
                    `Merk   : ${m}\n` +
                    `Tipe   : ${tp}\n` +
                    `Harga  : Rp ${parseInt(h).toLocaleString('id-ID')}\n` +
                    `Pot.TT : -Rp ${parseInt(p).toLocaleString('id-ID')}\n` +
                    `--------------------------\n` +
                    `TOTAL  : Rp ${total.toLocaleString('id-ID')}\n\n` +
                    `GARANSI: ${garansi}\n` +
                    `Aki Bekas Kami Beli Tinggi\n` +
                    `--------------------------\n` +
                    `      Terima Kasih!       \n` +
                    `--------------------------`;

        if(navigator.share) {
            navigator.share({ text: struk });
        } else {
            alert("Buka lewat Chrome ya!");
        }
    }
</script>
</body>
</html>
