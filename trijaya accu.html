<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR TRIJAYA ACCU</title>
    <style>
        :root { --bg: #f4f7f6; --text: #222; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--text); padding-bottom: 10px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .total-box { background: #fff1f0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; border: 1px solid #ffccc7; }
        .total-val { font-size: 28px; font-weight: bold; color: #cf1322; }
        button { width: 100%; padding: 16px; background: #222; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        /* Area Sembunyi untuk Gambar Struk */
        #canvas-wrap { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0">TRIJAYA ACCU</h2>
        <div style="font-size:12px; font-weight:bold;">KASIR NOTA GAMBAR</div>
    </div>

    <label>Merk Aki:</label>
    <select id="merk">
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB</option>
        <option value="JAP">JAP</option>
    </select>

    <label>Tipe (L/R Lengkap):</label>
    <input list="tipe-list" id="tipe" placeholder="Contoh: NS40ZL, NS60L">
    <datalist id="tipe-list">
        <option value="NS40ZL"> <option value="NS40L"> <option value="NS60L"> <option value="NS60R"> <option value="GTZ5S">
    </datalist>

    <label>Harga Jual:</label>
    <input type="number" id="harga" placeholder="0">

    <label>Potongan TT:</label>
    <input type="number" id="pot" value="0">

    <div class="total-box">
        <span class="total-val" id="totalDisplay">Rp 0</span>
    </div>

    <button onclick="buatGambarStruk()">BUAT STRUK (GAMBAR)</button>
</div>

<div id="canvas-wrap">
    <canvas id="strukCanvas" width="400" height="600"></canvas>
</div>

<script>
    // Update total harga
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        document.getElementById('totalDisplay').innerText = "Rp " + (h - p).toLocaleString('id-ID');
    }
    document.getElementById('harga').oninput = update;
    document.getElementById('pot').oninput = update;

    function buatGambarStruk() {
        const canvas = document.getElementById('strukCanvas');
        const ctx = canvas.getContext('2d');
        const m = document.getElementById('merk').value;
        const tp = document.getElementById('tipe').value;
        const h = parseInt(document.getElementById('harga').value) || 0;
        const p = parseInt(document.getElementById('pot').value) || 0;
        const total = h - p;
        const tgl = new Date().toLocaleDateString('id-ID');

        // Reset Canvas
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        ctx.textAlign = "center";

        // === FONT CARTOON OUTLINE (DIGAMBAR MANUAL) ===
        ctx.font = "900 45px Arial Black"; // Pakai font tebal
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        
        // Efek Outline: Gambar pinggiran (bolong tengahnya)
        ctx.strokeText("TRIJAYA", 200, 60);
        ctx.strokeText("ACCU", 200, 110);

        // Teks Biasa
        ctx.font = "bold 20px Arial";
        ctx.fillText("TUKAR TAMBAH ACCU", 200, 150);
        ctx.fillText("WA: 0821-4320-2129", 200, 180);

        ctx.font = "20px Courier New";
        ctx.fillText("---------------------------", 200, 210);
        
        ctx.textAlign = "left";
        ctx.fillText("Tanggal : " + tgl, 40, 240);
        ctx.fillText("Merk    : " + m, 40, 270);
        ctx.fillText("Tipe    : " + tp, 40, 300);
        ctx.fillText("Harga   : Rp " + h.toLocaleString('id-ID'), 40, 330);
        ctx.fillText("Pot. TT : -Rp " + p.toLocaleString('id-ID'), 40, 360);
        
        ctx.textAlign = "center";
        ctx.fillText("---------------------------", 200, 390);
        ctx.font = "bold 25px Arial";
        ctx.fillText("TOTAL : Rp " + total.toLocaleString('id-ID'), 200, 430);
        ctx.font = "20px Courier New";
        ctx.fillText("---------------------------", 200, 460);
        
        ctx.fillText("Garansi: " + (m === "GS ASTRA" ? "1 BULAN" : "3 BULAN"), 200, 490);
        ctx.fillText("---------------------------", 200, 520);
        ctx.fillText("*** TERIMA KASIH ***", 200, 550);

        // Convert Canvas ke Gambar (Blob) untuk di-Share
        canvas.toBlob(function(blob) {
            const file = new File([blob], "struk-trijaya.png", { type: "image/png" });
            if (navigator.share) {
                navigator.share({
                    files: [file],
                    title: 'Struk Trijaya Accu'
                });
            } else {
                alert("Gunakan Chrome di HP!");
            }
        });
    }
</script>
</body>
</html>
