<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR TRIJAYA ACCU</title>
    <style>
        :root { --bg: #f4f7f6; --text: #222; --accent: #d63031; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 420px; margin: auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--text); padding-bottom: 12px; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 26px; color: var(--text); font-weight: 900; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #555; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        select:focus, input:focus { border-color: var(--text); }
        .total-box { background: #fff5f5; padding: 15px; border-radius: 10px; margin-top: 25px; text-align: center; border: 2px dashed #fab1a0; }
        .total-val { font-size: 32px; font-weight: 900; color: var(--accent); }
        button { width: 100%; padding: 18px; background: var(--text); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        button:active { transform: scale(0.97); background: #000; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>TRIJAYA ACCU</h2>
        <div style="font-size: 11px; font-weight: 800; color: #666; letter-spacing: 1px;">TUKAR TAMBAH ACCU</div>
    </div>

    <label>PILIH MERK</label>
    <select id="merk" onchange="update()">
        <option value="">-- PILIH --</option>
        <option value="GS ASTRA">GS ASTRA</option>
        <option value="AMARON">AMARON</option>
        <option value="YUASA">YUASA</option>
        <option value="INCOE">INCOE</option>
        <option value="FASTER">FASTER</option>
        <option value="SOLITE">SOLITE</option>
        <option value="FB">FB</option>
        <option value="JAP">JAP</option>
        <option value="MOTOBATT">MOTOBATT</option>
        <option value="QS">QS</option>
        <option value="ITOBATT">ITOBATT</option>
    </select>

    <label>TIPE AKI (MOBIL/MOTOR)</label>
    <input list="tipe-list" id="tipe" placeholder="Ketik tipe: NS40ZL, NS60L, dll">
    <datalist id="tipe-list">
        <option value="GTZ5S"> <option value="YTZ5S"> <option value="GTZ6V"> <option value="GM5Z">
        <option value="NS40"> <option value="NS40Z"> <option value="NS40ZL"> <option value="NS40L">
        <option value="NS60"> <option value="NS60L"> <option value="NS60R"> <option value="NS60LS">
        <option value="N50"> <option value="N50Z"> <option value="N50ZL">
        <option value="NS70"> <option value="NS70L"> <option value="N70"> <option value="N70Z">
        <option value="N100"> <option value="N120"> <option value="N150"> <option value="N200">
    </datalist>

    <label>HARGA JUAL (Rp)</label>
    <input type="number" id="harga" placeholder="0" oninput="update()">

    <label>POTONGAN TT (Rp)</label>
    <input type="number" id="pot" value="0" oninput="update()">

    <div class="total-box">
        <div class="total-val" id="totalDisplay">Rp 0</div>
    </div>

    <button onclick="shareNota()">CETAK STRUK (SHARE)</button>
</div>

<script>
    function update() {
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let t = parseInt(h) - parseInt(p);
        document.getElementById('totalDisplay').innerText = "Rp " + t.toLocaleString('id-ID');
    }

    function r(label, value, width = 30) {
        let space = width - label.length - value.length;
        return label + " ".repeat(Math.max(1, space)) + value;
    }

    function c(text, width = 30) {
        let space = Math.floor((width - text.length) / 2);
        return " ".repeat(Math.max(0, space)) + text;
    }

    function shareNota() {
        let m = document.getElementById('merk').value;
        let tp = document.getElementById('tipe').value;
        let h = document.getElementById('harga').value || 0;
        let p = document.getElementById('pot').value || 0;
        let total = parseInt(h) - parseInt(p);
        let d = new Date();
        let tgl = String(d.getDate()).padStart(2,'0') + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + d.getFullYear();

        if (!m || !tp || h == 0) { alert("Data Belum Lengkap!"); return; }

        let garansi = (m === "GS ASTRA") ? "1 BULAN" : 
                      (m.includes("FB") || m.includes("SOLITE") || m.includes("JAP")) ? "12 BULAN" : "3 BULAN";

        let garis = "------------------------------";

        // === FONT CARTOON OUTLINE (SANS OUTLINE STYLE) ===
        // TRIJAYA = 𝕋 ℝ 𝕀 𝕁 𝔸 𝕐 𝔸
        // ACCU = 𝔸 ℂ ℂ 𝕌
        // Ini font kotak garis tepi yang pasti ke-print!
        let j1 = c("𝕋 ℝ 𝕀 𝕁 𝔸 𝕐 𝔸");
        let j2 = c("𝔸 ℂ ℂ 𝕌");

        let struk = 
            j1 + "\n" +
            j2 + "\n" +
            c("TUKAR TAMBAH ACCU") + "\n" +
            c("WA: 0821-4320-2129") + "\n" +
            garis + "\n" +
            r("Tanggal", tgl) + "\n" +
            garis + "\n" +
            r("Merk", m) + "\n" +
            r("Tipe", tp) + "\n" +
            r("Harga", "Rp " + parseInt(h).toLocaleString('id-ID')) + "\n" +
            r("Pot.TT", "-Rp " + parseInt(p).toLocaleString('id-ID')) + "\n" +
            garis + "\n" +
            r("TOTAL", "Rp " + total.toLocaleString('id-ID')) + "\n" +
            garis + "\n" +
            r("Garansi", garansi) + "\n" +
            garis + "\n" +
            c("*** TERIMA KASIH ***");

        if(navigator.share) {
            navigator.share({ text: struk });
        } else {
            alert("Pakai Chrome di HP Bos!");
        }
    }
</script>
</body>
</html>
